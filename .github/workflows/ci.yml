name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y build-essential git cmake g++-14
      - name: Configure
        run: cmake -B build -S . -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=ON -DNEXUS_USE_VCPKG=OFF -DCMAKE_CXX_STANDARD=20
      - name: Build (incl. tests)
        run: cmake --build build -j $(nproc)
      - name: Run tests
        run: ctest --test-dir build --output-on-failure --timeout 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & Test
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\VsDevCmd.bat" -arch=x64
          cmake -B build -S . -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=ON -DNEXUS_USE_VCPKG=OFF -DFETCHCONTENT_FULLY_DISCONNECTED=OFF
          cmake --build build --config Release -j
          ctest --test-dir build -C Release --output-on-failure --timeout 30

      - name: Upload EXEs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-windows-x64
          path: |
            build/bin/Release/*.exe

  # ═══════════════════════════════════════════════════════════════
  # 静态分析 (cppcheck) — 仅分析 src/ 排除 third_party
  # ═══════════════════════════════════════════════════════════════
  quality:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Static analysis
        run: |
          cppcheck --enable=warning \
            --suppress=missingIncludeSystem \
            --suppress=ctuOneDefinitionRuleViolation \
            --suppress=operatorEqVarError \
            --inline-suppr \
            -I include/ \
            --std=c++20 \
            src/ 2>&1 | tee cppcheck_report.txt

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck_report.txt

  # ═══════════════════════════════════════════════════════════════
  # 线程安全分析 (TSan) — continue-on-error
  # ═══════════════════════════════════════════════════════════════
  sanitizer:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y build-essential git cmake
      - name: Configure (TSan)
        run: cmake -B build-tsan -S . -DCMAKE_BUILD_TYPE=Debug -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer -g -O1"
      - name: Build
        run: cmake --build build-tsan -j $(nproc)
      - name: Test
        run: ctest --test-dir build-tsan --output-on-failure --timeout 60 2>&1 || echo "TSan reported issues (non-blocking)"

  # ═══════════════════════════════════════════════════════════════
  # 覆盖率 — continue-on-error (覆盖数据生成需调优)
  # ═══════════════════════════════════════════════════════════════
  coverage:
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y build-essential git cmake gcovr
      - name: Configure (coverage)
        run: cmake -B build-cov -S . -DCMAKE_BUILD_TYPE=Debug -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=ON -DNEXUS_USE_VCPKG=OFF -DCMAKE_CXX_FLAGS="--coverage -g -O0"
      - name: Build
        run: cmake --build build-cov -j $(nproc)
      - name: Test
        run: ctest --test-dir build-cov --output-on-failure --timeout 30
      - name: Coverage check
        run: |
          gcovr --root . \
            --object-directory build-cov \
            --gcov-ignore-parse-errors \
            --exclude third_party/ \
            --exclude build-cov/ \
            --exclude tests/ \
            --exclude src/ipc/ \
            --fail-under-line 5 || echo "Coverage below threshold (non-blocking)"
