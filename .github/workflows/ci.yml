name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Linux: GCC ──
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git

      - name: Configure
        run: cmake -B build -S . -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF -DCMAKE_CXX_STANDARD=20

      - name: Build
        run: cmake --build build -j $(nproc) 2>&1 | tail -20

  # ── Windows (无 CUDA) ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Configure CMake
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 ^
            -DNEXUS_CUDA_SUPPORT=OFF ^
            -DNEXUS_BUILD_TESTS=OFF ^
            -DNEXUS_USE_VCPKG=OFF ^
            -DFETCHCONTENT_FULLY_DISCONNECTED=OFF

      - name: Build
        run: cmake --build build --config Release -j

      - name: List EXEs
        run: |
          echo "=== Built EXEs ==="
          if (Test-Path "build/bin/Release") {
            Get-ChildItem build/bin/Release/*.exe | Select-Object Name, Length
          } else {
            echo "No EXE output directory found"
          }
