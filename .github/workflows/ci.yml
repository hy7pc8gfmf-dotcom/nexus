name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Linux: GCC 构建
  # ═══════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential git

      - name: Configure
        run: cmake -B build -S . -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF -DCMAKE_CXX_STANDARD=20 -DFETCHCONTENT_FULLY_DISCONNECTED=ON
        continue-on-error: false

      - name: Build
        run: cmake --build build -j $(nproc) 2>&1 | tail -50
        continue-on-error: true

      - name: Check errors
        run: |
          errors=$(cmake --build build -j $(nproc) 2>&1 | grep -ci "error" || echo "0")
          echo "Error count: $errors"
          if [ "$errors" != "0" ]; then
            cmake --build build -j $(nproc) 2>&1 | grep -i "error" | head -20
            exit 1
          fi
          echo "BUILD OK"

  # ═══════════════════════════════════════════════════════════════
  # Windows: MSVC + Ninja (不依赖 VS 生成器)
  # ═══════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup VS env
        shell: pwsh
        run: |
          # 使用 vswhere 定位 VS
          $vsPath = & "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\Launch-VsDevShell.ps1" 2>$null
          if (-not $vsPath) {
            # 手动设置环境
            $msvcRoot = "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Tools\MSVC"
            $sdkRoot = "C:\Program Files (x86)\Windows Kits\10"
            $sdkVer = "10.0.22621.0"
            $msvcVer = (Get-ChildItem "$msvcRoot\14.*" | Select-Object -First 1).Name
            $clPath = "$msvcRoot\$msvcVer\bin\Hostx64\x64"
            echo "$clPath" | Out-File -FilePath $env:GITHUB_PATH -Append
            echo "INCLUDE=$msvcRoot\$msvcVer\include;$sdkRoot\Include\$sdkVer\ucrt;$sdkRoot\Include\$sdkVer\shared;$sdkRoot\Include\$sdkVer\um" | Out-File -FilePath $env:GITHUB_ENV -Append
            echo "LIB=$msvcRoot\$msvcVer\lib\x64;$sdkRoot\Lib\$sdkVer\ucrt\x64;$sdkRoot\Lib\$sdkVer\um\x64" | Out-File -FilePath $env:GITHUB_ENV -Append
          }
          # 验证
          cl.exe 2>&1 | findstr "Microsoft" && echo "MSVC OK" || echo "MSVC NOT FOUND"

      - name: Configure (Ninja)
        run: cmake -B build -S . -G Ninja -DCMAKE_C_COMPILER=cl.exe -DCMAKE_CXX_COMPILER=cl.exe -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF -DFETCHCONTENT_FULLY_DISCONNECTED=OFF

      - name: Build
        run: cmake --build build -j 2>&1

      - name: List EXEs
        shell: pwsh
        run: |
          $exes = Get-ChildItem build/*.exe -Recurse
          $exes | Select-Object Name, Length
          Write-Output "Total: $($exes.Count) EXEs"

  # ═══════════════════════════════════════════════════════════════
  # 环境诊断 (Ubuntu + Windows)
  # ═══════════════════════════════════════════════════════════════
  diagnostics:
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - run: |
          echo "=== OS ==="
          python --version 2>/dev/null || py --version 2>/dev/null
          cmake --version | head -1
