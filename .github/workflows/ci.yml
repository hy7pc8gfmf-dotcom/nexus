name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y build-essential git cmake g++-14
      - name: Configure
        run: cmake -B build -S . -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=ON -DNEXUS_USE_VCPKG=OFF -DCMAKE_CXX_STANDARD=20
      - name: Build main EXEs
        run: cmake --build build -j $(nproc)
      - name: Build tests
        run: cmake --build build -j $(nproc) --target nexus_tests
      - name: Run tests
        run: ctest --test-dir build --output-on-failure --timeout 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & Test
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\VsDevCmd.bat" -arch=x64
          cmake -B build -S . -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=ON -DNEXUS_USE_VCPKG=OFF -DFETCHCONTENT_FULLY_DISCONNECTED=OFF
          cmake --build build --config Release -j
          ctest --test-dir build -C Release --output-on-failure --timeout 30

      - name: Upload EXEs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-windows-x64
          path: |
            build/bin/Release/*.exe
