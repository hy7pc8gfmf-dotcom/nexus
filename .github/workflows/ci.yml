name: CI

on:
  push:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y build-essential git
      - run: cmake -B build -S . -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF -DCMAKE_CXX_STANDARD=20 -DFETCHCONTENT_FULLY_DISCONNECTED=ON
      - run: cmake --build build -j $(nproc) 2>&1 | tail -30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - shell: pwsh
        run: |
          # Single step: setup env + configure + build
          $ErrorActionPreference = 'Stop'

          # Find VS via vswhere
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $vcvars = "$vsPath\VC\Auxiliary\Build\vcvars64.bat"
          Write-Output "VS: $vsPath"
          Write-Output "vcvars: $vcvars"

          # Run vcvars and get environment
          cmd /c "call `"$vcvars`" >nul 2>nul && cmake -B build -S . -G Ninja -DCMAKE_C_COMPILER=cl.exe -DCMAKE_CXX_COMPILER=cl.exe -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF -DFETCHCONTENT_FULLY_DISCONNECTED=OFF && cmake --build build -j" 2>&1
          if ($LASTEXITCODE -ne 0) { throw "Build failed" }
          dir build\*.exe -Recurse | Select-Object Name, Length
