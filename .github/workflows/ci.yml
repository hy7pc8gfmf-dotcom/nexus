name: Full Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Linux: GCC, no CUDA ──
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential git
      - name: Configure
        run: cmake -B build -S . -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF -DCMAKE_CXX_STANDARD=20
      - name: Build
        run: cmake --build build -j $(nproc) 2>&1 | tail -30
      - name: List artifacts
        run: find build -executable -type f 2>/dev/null | head -20 || echo "check manually"

  # ── Windows: MSVC, no CUDA ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
      - name: Configure
        run: cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF -DFETCHCONTENT_FULLY_DISCONNECTED=OFF
      - name: Build
        run: cmake --build build --config Release -j
      - name: Verify EXEs
        run: |
          echo "=== Built EXEs ==="
          Get-ChildItem build/bin/Release/*.exe | Select-Object Name, Length

  # ── Windows: Ninja (no VS generator) ──
  build-windows-ninja:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ninja
        run: choco install ninja -y
      - name: Setup MSVC env
        shell: pwsh
        run: |
          $msvc = "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Tools\MSVC"
          $ver = (Get-ChildItem $msvc | Select-Object -First 1).Name
          $sdk = "C:\Program Files (x86)\Windows Kits\10"
          $sdkVer = "10.0.22621.0"
          echo "MSVC_ROOT=$msvc\$ver" >> $env:GITHUB_ENV
          echo "INCLUDE=$msvc\$ver\include;$sdk\Include\$sdkVer\ucrt;$sdk\Include\$sdkVer\shared;$sdk\Include\$sdkVer\um" >> $env:GITHUB_ENV
          echo "LIB=$msvc\$ver\lib\x64;$sdk\Lib\$sdkVer\ucrt\x64;$sdk\Lib\$sdkVer\um\x64" >> $env:GITHUB_ENV
      - name: Configure (Ninja)
        run: cmake -B build -S . -G Ninja -DCMAKE_C_COMPILER=cl.exe -DCMAKE_CXX_COMPILER=cl.exe -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF
      - name: Build
        run: cmake --build build -j
      - name: List EXEs
        run: Get-ChildItem build/*.exe -Recurse | Select-Object Name, Length
