name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF
          cmake --build build --config Release -j

      - name: Package
        run: |
          mkdir nexus-release
          copy build\bin\Release\*.exe nexus-release\
          copy LICENSE nexus-release\
          copy README.md nexus-release\
          tar -a -c -f nexus-${{ github.ref_name }}.zip nexus-release\

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: nexus-*.zip
