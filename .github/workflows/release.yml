name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        shell: pwsh
        run: |
          $installer = "$env:TEMP\innosetup.exe"
          curl.exe -sSL "https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe" -o $installer
          Start-Process $installer -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /DIR=$env:LOCALAPPDATA\Programs\Inno Setup 6" -Wait
          Write-Output "Inno Setup installed"

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\Tools\VsDevCmd.bat" -arch=x64
          cmake -B build -S . -DNEXUS_CUDA_SUPPORT=OFF -DNEXUS_BUILD_TESTS=OFF -DNEXUS_USE_VCPKG=OFF -DFETCHCONTENT_FULLY_DISCONNECTED=OFF
          cmake --build build --config Release -j

      - name: Package (Inno Setup)
        shell: cmd
        run: |
          set PATH=%PATH%;%LOCALAPPDATA%\Programs\Inno Setup 6
          ISCC.exe packaging\windows\setup.iss
        continue-on-error: false

      - name: List dist (debug)
        shell: pwsh
        run: Get-ChildItem dist\ -Recurse -Name

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Nexus-*-Setup.exe
          generate_release_notes: true
